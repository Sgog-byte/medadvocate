<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MedAdvocate — Medical Summary</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--sage:#2d6a4f;--sage-deep:#1b4332;--sage-light:#95d5b2;--sage-pale:#e8f5ee;--warm:#fdfcf8;--ink:#0d1f15;--ink-soft:#1b4332;--ink-muted:#2d6a4f;--border:#b7d9c4;--white:#ffffff;--amber:#c9923a;--amber-pale:#fdf3e7;--amber-light:#f0d4a8;--red:#c0392b;--red-pale:#fff5f5;--red-border:#fccaca;--blue:#3a7bc8;--blue-pale:#eef4fc;--shadow-sm:0 2px 12px rgba(28,43,34,.06);--shadow:0 4px 24px rgba(28,43,34,.10);--shadow-lg:0 12px 48px rgba(28,43,34,.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--warm);color:var(--ink);min-height:100vh}
nav{position:sticky;top:0;z-index:100;background:#fdfcf8;border-bottom:2px solid var(--sage-deep);padding:0 28px;display:flex;align-items:center;height:60px;gap:10px}
.nav-back{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--ink-muted);padding:7px 14px;border:1.5px solid var(--border);border-radius:100px;cursor:pointer;background:none;font-family:'DM Sans',sans-serif;transition:all .2s}
.nav-back:hover{border-color:var(--sage);color:var(--sage-deep)}
.nav-logo{display:flex;align-items:center;gap:9px;margin-right:auto}
.nav-gem{width:30px;height:30px;background:var(--sage-deep);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px}
.nav-wordmark{font-family:'Fraunces',serif;font-size:18px;font-weight:400;color:var(--ink)}
.nav-wordmark .dot{display:inline-block;width:7px;height:7px;background:var(--sage-light);border-radius:50%;margin:0 3px 3px 2px;vertical-align:middle}
.nav-wordmark .adv{color:var(--sage);font-weight:300}
.shell{max-width:860px;margin:0 auto;padding:0 22px 80px}
.page-header{padding:28px 0 20px;text-align:center}
.page-icon{font-size:40px;margin-bottom:10px}
.page-title{font-family:'Fraunces',serif;font-size:30px;font-weight:300;color:var(--ink);margin-bottom:7px}
.page-title em{font-style:italic;color:var(--sage)}
.page-sub{font-size:14px;color:var(--ink-muted);font-weight:300;max-width:500px;margin:0 auto}
.fcard{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:22px 24px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.finput,.ftextarea{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;color:var(--ink);background:var(--warm);outline:none;transition:border-color .2s;resize:none}
.finput:focus,.ftextarea:focus{border-color:var(--sage);background:var(--white)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.flabel{display:block;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:5px}
.btn-primary{padding:12px 24px;background:var(--sage-deep);color:white;border:none;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-primary:hover{background:var(--ink)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-outline{padding:10px 18px;background:transparent;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink-soft);cursor:pointer;transition:all .2s}
.btn-outline:hover{border-color:var(--sage);color:var(--sage-deep)}
.sources-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;margin-bottom:18px}
.source-chip{display:flex;align-items:center;gap:8px;padding:9px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;cursor:pointer;background:var(--white);transition:all .2s;user-select:none}
.source-chip.has-data{border-color:var(--sage-light);background:var(--sage-pale)}
.source-chip.has-data.selected{border-color:var(--sage-deep);box-shadow:0 0 0 2px var(--sage-deep)}
.source-chip.no-data{opacity:.4;cursor:not-allowed}
.source-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#ccc}
.source-dot.green{background:var(--sage)}
.summary-doc{background:var(--white);border:2px solid var(--sage-deep);border-radius:18px;overflow:hidden;box-shadow:var(--shadow-lg)}
.sum-header{background:var(--sage-deep);padding:24px 28px;color:white}
.sum-patient{font-family:'Fraunces',serif;font-size:24px;font-weight:300;margin-bottom:4px}
.sum-meta{font-size:12px;color:rgba(255,255,255,.6)}
.sum-body{padding:24px 28px}
.sum-sec{margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid var(--border)}
.sum-sec:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.sum-sec-title{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--sage-deep);margin-bottom:10px}
.sum-item{padding:9px 13px;background:var(--sage-pale);border-radius:9px;margin-bottom:7px;font-size:14px;color:var(--ink-soft);line-height:1.6}
.sum-item.red{background:var(--red-pale);border-left:3px solid var(--red)}
.sum-item.amber{background:var(--amber-pale);border-left:3px solid var(--amber)}
.sum-footer{background:var(--warm);border-top:1px solid var(--border);padding:12px 28px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--ink-muted)}
.load-wrap{text-align:center;padding:48px 24px}
.load-ring{width:48px;height:48px;margin:0 auto 18px;border-radius:50%;border:2.5px solid var(--border);border-top-color:var(--sage);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.abtn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border:none}
.abtn-dark{background:var(--ink);color:white}
.abtn-outline{background:transparent;border:1.5px solid var(--border);color:var(--ink-soft)}
.abtn-outline:hover{border-color:var(--sage);color:var(--sage-deep)}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:white;padding:10px 22px;border-radius:100px;font-size:13px;font-weight:500;transition:transform .3s;z-index:9999}
.toast.show{transform:translateX(-50%) translateY(0)}
@media print{nav,.fcard,.action-row{display:none!important}.shell{max-width:100%;padding:0}.sum-header{-webkit-print-color-adjust:exact;print-color-adjust:exact}@page{margin:12mm}}
@media(max-width:640px){.two-col{grid-template-columns:1fr}.sum-body,.sum-header{padding:16px}}
</style>
  <!-- Supabase auth + data layer -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-client.js"></script>

</head>
<body>
<nav>
  <button class="nav-back" onclick="window.location.href='index.html'">← Home</button>
  <div class="nav-logo"><div class="nav-gem">🌿</div><div class="nav-wordmark">Med<span class="dot"></span><span class="adv">Advocate</span></div></div>
</nav>
<div class="shell">
  <div class="page-header">
    <div class="page-icon">📋</div>
    <h1 class="page-title">Medical <em>Summary</em></h1>
    <p class="page-sub">A complete clinical snapshot pulled automatically from all your MedAdvocate tools. Hand it to any new doctor in 60 seconds.</p>
  </div>

  <div class="fcard">
    <div style="font-family:'Fraunces',serif;font-size:17px;color:var(--ink);margin-bottom:4px">Choose What to Include</div>
    <div style="font-size:13px;color:var(--ink-muted);margin-bottom:14px;font-weight:300">🟢 Green = data found in your tools · Grey = no data yet · Click to toggle sections</div>
    <div class="sources-grid" id="sources_grid"></div>
    <div style="margin-bottom:12px">
      <label class="flabel">Appointment / Purpose</label>
      <input type="text" class="finput" id="sum_purpose" placeholder="e.g. New patient — Pediatric Cardiology, Dr. Webb · CHOA">
    </div>
    <div class="two-col" style="margin-bottom:14px">
      <div>
        <label class="flabel">Additional context</label>
        <textarea class="ftextarea" id="sum_notes" placeholder="Anything else the doctor should know…" style="min-height:70px"></textarea>
      </div>
      <div>
        <label class="flabel">Goals for this visit</label>
        <textarea class="ftextarea" id="sum_goals" placeholder="e.g. Diagnosis, referral, new treatment options…" style="min-height:70px"></textarea>
      </div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button class="btn-primary" onclick="generateSummary()" id="gen_btn">📋 Generate Medical Summary</button>
      <button class="btn-outline" onclick="window.print()">🖨️ Print</button>
    </div>
  </div>
  <div id="sum_out"></div>
</div>
<div class="toast" id="toast"></div>

<script>
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
function fmtD(d){if(!d)return'';try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch{return d}}

const SOURCES=[
  {key:'profile',icon:'👤',label:'Patient Profile',check:()=>Object.keys((await DB.getProfile())).filter(k=>(await DB.getProfile())[k]).length>0},
  {key:'diagnoses',icon:'🔴',label:'Diagnoses',check:()=>(await DB.getProfile()).diagnoses?.length>0},
  {key:'medications',icon:'💊',label:'Medications',check:()=>(await DB.getMedications()).length>0},
  {key:'symptoms',icon:'📊',label:'Symptoms',check:()=>(await DB.getSymptomEntries()).length>0},
  {key:'labs',icon:'🧪',label:'Lab Results',check:()=>(await DB.getLabResults()).length>0},
  {key:'tests',icon:'🔬',label:'Tests & Imaging',check:()=>(await DB.getDiagnosticTests()).length>0},
  {key:'timeline',icon:'📅',label:'Medical History',check:()=>(await DB.getTimelineEvents()).length>0},
  {key:'flares',icon:'🔥',label:'Flare History',check:()=>(await DB.getFlares()).length>0},
  {key:'careteam',icon:'👥',label:'Care Team',check:()=>(await DB.getCareTeam()).length>0},
  {key:'documents',icon:'📄',label:'Documents',check:()=>(await DB.getDocuments()).length>0},
];

let sel=new Set();

function renderSources(){
  const grid=document.getElementById('sources_grid');
  grid.innerHTML=SOURCES.map(s=>{
    const has=s.check();
    if(has)sel.add(s.key);
    return`<div class="source-chip ${has?'has-data selected':'no-data'}" id="chip-${s.key}" onclick="${has?`toggleSrc('${s.key}')`:''}" style="gap:8px">
      <div class="source-dot ${has?'green':''}"></div>
      <span style="flex:1">${s.icon} ${s.label}</span>
      <span style="font-size:10px;color:${has?'var(--sage)':'#ccc'}">${has?'✓':'—'}</span>
    </div>`;
  }).join('');
}

function toggleSrc(key){
  const chip=document.getElementById('chip-'+key);
  if(sel.has(key)){sel.delete(key);chip.classList.remove('selected');}
  else{sel.add(key);chip.classList.add('selected');}
}

function buildData(){
  const p=(await DB.getProfile());
  const meds=(await DB.getMedications());
  const timeline=(await DB.getTimelineEvents());
  const flares=(await DB.getFlares());
  const symState=JSON.parse(localStorage.getItem('advocate_symptoms')||'{"trackedSymptoms":[]}');
  const symEntries=(await DB.getSymptomEntries());
  const labs=(await DB.getLabResults());
  const tests=(await DB.getDiagnosticTests());
  const contacts=(await DB.getCareTeam());
  const docs=(await DB.getDocuments());
  const parts=[];

  if(sel.has('profile')&&p.name) parts.push(`PATIENT: ${p.name}${p.age?', age '+p.age:''}`);
  if(sel.has('diagnoses')&&p.diagnoses) parts.push(`DIAGNOSES: ${p.diagnoses}`);
  if(sel.has('medications')&&meds.length){
    const active=meds.filter(m=>m.status==='active');
    const stopped=meds.filter(m=>m.status!=='active');
    if(active.length) parts.push(`CURRENT MEDICATIONS:\n${active.map(m=>`- ${m.name}${m.dose?' '+m.dose:''}${m.freq?' '+m.freq:''}${m.reason?' — '+m.reason:''}`).join('\n')}`);
    if(stopped.length) parts.push(`STOPPED/PAUSED: ${stopped.map(m=>m.name).join(', ')}`);
  }
  if(sel.has('symptoms')&&symEntries.length){
    const latest=symEntries[symEntries.length-1];
    const tracked=symState.trackedSymptoms||[];
    const DOD={3:'Sometimes distracts',4:'Distracts, can function',5:'Interrupts activities',6:'Hard to ignore',7:'Prevents daily activities',8:'Awful',9:"Can't bear it",10:'Worst possible'};
    const active=tracked.filter(s=>latest.symptoms?.[s.id]>=3).sort((a,b)=>(latest.symptoms[b.id]||0)-(latest.symptoms[a.id]||0));
    if(active.length) parts.push(`CURRENT SYMPTOMS (${fmtD(latest.date)}):\n${active.map(s=>`- ${s.label}: ${latest.symptoms[s.id]}/10 — ${DOD[latest.symptoms[s.id]]||'Severe'}`).join('\n')}`);
  }
  if(sel.has('labs')&&labs.length){
    const latest=labs[labs.length-1];
    const abnormal=latest.results?.filter(r=>r.status==='high'||r.status==='low'||r.status==='critical')||[];
    parts.push(`LABS (${fmtD(latest.date)}): ${abnormal.length?'Abnormal — '+abnormal.map(r=>`${r.name}: ${r.value} ${r.unit} (${r.status})`).join(', '):'All within normal range'}`);
  }
  if(sel.has('tests')&&tests.length){
    const abnormal=tests.filter(t=>t.status==='abnormal');
    parts.push(`TESTS & IMAGING (${tests.length} total):\n${tests.slice(0,6).map(t=>`- ${t.type} (${fmtD(t.date)}): ${t.status}${t.results?' — '+t.results.substring(0,80):''}`).join('\n')}${abnormal.length?'\nABNORMAL: '+abnormal.map(t=>t.type).join(', '):''}`);
  }
  if(sel.has('timeline')&&timeline.length){
    const sorted=[...timeline].sort((a,b)=>new Date(a.date)-new Date(b.date));
    ['diagnosis','hospitalization','procedure'].forEach(cat=>{
      const evts=sorted.filter(e=>e.cat===cat);
      if(evts.length) parts.push(`${cat.toUpperCase()}S:\n${evts.map(e=>`- ${fmtD(e.date)}: ${e.title}${e.doctor?' ('+e.doctor+')':''}`).join('\n')}`);
    });
  }
  if(sel.has('flares')&&flares.length){
    const recent=flares.slice(0,10);
    const avg=(recent.reduce((a,f)=>a+f.severity,0)/recent.length).toFixed(1);
    const triggers=Object.entries(recent.reduce((acc,f)=>{(f.triggers||[]).forEach(t=>acc[t]=(acc[t]||0)+1);return acc},{})).sort((a,b)=>b[1]-a[1]);
    parts.push(`FLARE HISTORY: ${flares.length} flares. Avg severity: ${avg}/10. Top triggers: ${triggers.slice(0,3).map(t=>t[0]).join(', ')||'unspecified'}`);
  }
  if(sel.has('careteam')&&contacts.length){
    parts.push(`CARE TEAM:\n${contacts.map(c=>`- ${c.name}${c.specialty?', '+c.specialty:''}${c.practice?' at '+c.practice:''}${c.phone?' · '+c.phone:''}`).join('\n')}`);
  }
  if(sel.has('documents')&&docs.length){
    parts.push(`DOCUMENTS ON FILE: ${docs.map(d=>d.name||d.type||'Document').join(', ')}`);
  }
  return parts.join('\n\n');
}

async function generateSummary(){
  if(sel.size===0){showToast('Please select at least one data source');return;}
  const dataStr=buildData();
  if(!dataStr.trim()){showToast('No data found in selected sections — add data to your tools first');return;}
  const purpose=document.getElementById('sum_purpose').value.trim();
  const notes=document.getElementById('sum_notes').value.trim();
  const goals=document.getElementById('sum_goals').value.trim();
  const profile=(await DB.getProfile());
  const out=document.getElementById('sum_out');
  document.getElementById('gen_btn').disabled=true;
  out.innerHTML=`<div class="load-wrap"><div class="load-ring"></div><p style="font-family:'Fraunces',serif;font-size:18px;font-weight:300;color:var(--ink);margin-bottom:6px">Building your medical summary…</p><p style="font-size:13px;color:var(--ink-muted)">Synthesizing data from ${sel.size} sources</p></div>`;

  try{
    const r=await fetch('/.netlify/functions/claude-proxy',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,
        system:`You create professional clinical summary documents for medical advocates. Write clearly and clinically — a specialist should respect this document immediately. Return ONLY valid JSON no markdown:
{"clinicalSnapshot":"3-4 sentence professional clinical overview","primaryConcerns":["Top 3-5 current clinical concerns stated clinically"],"currentMedications":[{"name":"","dose":"","indication":""}],"recentFindings":["Notable lab, test, or imaging findings"],"medicalHistory":["Key historical events chronologically"],"currentSymptoms":[{"symptom":"","severity":"","impact":""}],"careTeam":[{"name":"","role":""}],"goalsForVisit":["Patient goals"],"redFlags":["Urgent items — empty array if none"],"questionsForDoctor":["3-4 specific clinical questions based on this data"]}`,
        messages:[{role:'user',content:`Patient data:\n\n${dataStr}${purpose?'\n\nAppointment: '+purpose:''}${notes?'\n\nAdditional context: '+notes:''}${goals?'\n\nPatient goals: '+goals:''}`}]})
    });
    const d=await r.json();
    const res=JSON.parse((d.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
    const today=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    const name=profile.name||'Patient';

    out.innerHTML=`
      <div class="action-row" style="display:flex;gap:9px;flex-wrap:wrap;margin-bottom:14px">
        <button class="abtn abtn-dark" onclick="window.print()">🖨️ Print</button>
        <button class="abtn abtn-outline" onclick="emailSum()">✉️ Email</button>
        <button class="abtn abtn-outline" onclick="copySum()">📋 Copy</button>
        <button class="abtn abtn-outline" onclick="document.getElementById('sum_out').innerHTML=''">✕ Clear</button>
      </div>
      <div class="summary-doc">
        <div class="sum-header">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
            <div>
              <div class="sum-patient">${escH(name)}${profile.age?', age '+profile.age:''}</div>
              <div class="sum-meta">${purpose?escH(purpose)+' · ':''}${today} · MedAdvocate</div>
            </div>
            <div style="font-family:'Fraunces',serif;font-size:32px;color:rgba(255,255,255,.3)">📋</div>
          </div>
        </div>
        <div class="sum-body">
          ${res.clinicalSnapshot?`<div class="sum-sec"><div class="sum-sec-title">🩺 Clinical Snapshot</div><div style="font-family:'Fraunces',serif;font-style:italic;font-size:16px;color:var(--ink-soft);line-height:1.7;padding:14px 18px;background:var(--sage-pale);border-left:3px solid var(--sage);border-radius:0 12px 12px 0">${escH(res.clinicalSnapshot)}</div></div>`:''}
          ${res.redFlags?.length?`<div class="sum-sec"><div class="sum-sec-title" style="color:var(--red)">🚨 Red Flags — Urgent</div>${res.redFlags.map(f=>`<div class="sum-item red">⚠️ ${escH(f)}</div>`).join('')}</div>`:''}
          ${res.primaryConcerns?.length?`<div class="sum-sec"><div class="sum-sec-title">🔴 Primary Concerns</div>${res.primaryConcerns.map(c=>`<div class="sum-item">${escH(c)}</div>`).join('')}</div>`:''}
          ${res.currentSymptoms?.length?`<div class="sum-sec"><div class="sum-sec-title">📊 Current Symptoms</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">${res.currentSymptoms.map(s=>`<div style="padding:10px 13px;background:var(--warm);border:1px solid var(--border);border-radius:10px"><div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px">${escH(s.symptom)}</div><div style="font-size:12px;color:var(--ink-muted)">${s.severity?escH(s.severity):''}${s.impact?' · '+escH(s.impact):''}</div></div>`).join('')}</div></div>`:''}
          ${res.currentMedications?.length?`<div class="sum-sec"><div class="sum-sec-title">💊 Current Medications</div>${res.currentMedications.map(m=>`<div class="sum-item"><strong>${escH(m.name)}</strong>${m.dose?' — '+escH(m.dose):''}${m.indication?' · '+escH(m.indication):''}</div>`).join('')}</div>`:''}
          ${res.recentFindings?.length?`<div class="sum-sec"><div class="sum-sec-title">🧪 Recent Findings</div>${res.recentFindings.map(f=>`<div class="sum-item amber">→ ${escH(f)}</div>`).join('')}</div>`:''}
          ${res.medicalHistory?.length?`<div class="sum-sec"><div class="sum-sec-title">📅 Medical History</div>${res.medicalHistory.map(h=>`<div class="sum-item">${escH(h)}</div>`).join('')}</div>`:''}
          ${res.careTeam?.length?`<div class="sum-sec"><div class="sum-sec-title">👥 Care Team</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px">${res.careTeam.map(c=>`<div style="padding:9px 13px;background:var(--warm);border:1px solid var(--border);border-radius:10px;font-size:13px"><strong>${escH(c.name)}</strong>${c.role?'<br><span style="color:var(--ink-muted);font-size:12px">'+escH(c.role)+'</span>':''}</div>`).join('')}</div></div>`:''}
          ${res.goalsForVisit?.length?`<div class="sum-sec"><div class="sum-sec-title">🎯 Goals for This Visit</div>${res.goalsForVisit.map(g=>`<div class="sum-item">→ ${escH(g)}</div>`).join('')}</div>`:''}
          ${res.questionsForDoctor?.length?`<div class="sum-sec"><div class="sum-sec-title">❓ Questions for the Doctor</div>${res.questionsForDoctor.map(q=>`<div class="sum-item">? ${escH(q)}</div>`).join('')}</div>`:''}
        </div>
        <div class="sum-footer">
          <span>Generated from patient-entered data. Verify all information with your healthcare provider.</span>
          <span style="font-family:'Fraunces',serif">MedAdvocate · medadvocate.org</span>
        </div>
      </div>`;

    window._sumText=`MEDICAL SUMMARY — ${name}\n${today}${purpose?'\n'+purpose:''}\n\n${res.clinicalSnapshot||''}\n\nPRIMARY CONCERNS:\n${(res.primaryConcerns||[]).map(c=>'• '+c).join('\n')}\n\nMEDICATIONS:\n${(res.currentMedications||[]).map(m=>'• '+m.name+' '+m.dose).join('\n')}\n\nQUESTIONS FOR DOCTOR:\n${(res.questionsForDoctor||[]).map(q=>'? '+q).join('\n')}`;
  }catch(e){
    out.innerHTML=`<div style="background:var(--red-pale);border:1px solid var(--red-border);border-radius:12px;padding:16px;color:var(--red)">Something went wrong. Please try again.</div>`;
    console.error(e);
  }finally{document.getElementById('gen_btn').disabled=false;}
}

function emailSum(){
  const p=(await DB.getProfile());
  window.location.href=`mailto:?subject=${encodeURIComponent('Medical Summary — '+(p.name||'Patient'))}&body=${encodeURIComponent(window._sumText||'')}`;
}
function copySum(){navigator.clipboard.writeText(window._sumText||'').then(()=>showToast('Copied ✓'));}

renderSources();
</script>
</body>
</html>
